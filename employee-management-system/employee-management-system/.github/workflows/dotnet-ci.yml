name: .NET CI

on:
  push:
    branches:
      - main
      - feature/*

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Packages
        run: dotnet restore

      - name: Build Project
        run: dotnet build --no-restore

      - name: Pipeline Success
        run: echo "Build completed successfully"